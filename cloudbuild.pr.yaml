substitutions:
  _REGION: us-central1
  _AR_REPOSITORY: passanota-images
  _IMAGE_NAME: passanota-web
  _SECRET_SUPABASE_PUBLISHABLE_KEY: PASSANOTA_SUPABASE_PUBLISHABLE_KEY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_SUPABASE_PUBLISHABLE_KEY}/versions/latest
      env: SUPABASE_PUBLISHABLE_KEY

steps:
  - id: validate
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        echo "Checking secret: ${_SECRET_SUPABASE_PUBLISHABLE_KEY}"
        gcloud secrets describe "${_SECRET_SUPABASE_PUBLISHABLE_KEY}" --project="$PROJECT_ID" >/dev/null
        echo "Validation OK (PR, commit: $COMMIT_SHA)"

  - id: lint
    name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        corepack enable && corepack prepare pnpm@8.15.9 --activate
        pnpm install --frozen-lockfile
        pnpm lint
        pnpm typecheck
    waitFor: [validate]

  - id: build
    name: gcr.io/cloud-builders/docker
    secretEnv: [SUPABASE_PUBLISHABLE_KEY]
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:pr-$SHORT_SHA
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$$SUPABASE_PUBLISHABLE_KEY
      - --build-arg
      - NEXT_PUBLIC_APP_URL=https://placeholder.example.com
      - .
    waitFor: [lint]

options:
  logging: CLOUD_LOGGING_ONLY
