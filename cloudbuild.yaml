substitutions:
  _REGION: us-central1
  _AR_REPOSITORY: passanota
  _SERVICE_NAME: passanota-web
  _SUPABASE_URL: ""
  _SUPABASE_PUBLISHABLE_KEY: ""
  _APP_URL: ""
  _PASSANOTA_API_URL: ""

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA"

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - "--build-arg=NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL}"
      - "--build-arg=NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${_SUPABASE_PUBLISHABLE_KEY}"
      - "--build-arg=NEXT_PUBLIC_APP_URL=${_APP_URL}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA"
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--set-env-vars=PASSANOTA_API_URL=${_PASSANOTA_API_URL}"
      - "--quiet"
