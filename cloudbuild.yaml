substitutions:
  # Infra
  _AR_HOSTNAME: us-central1-docker.pkg.dev
  _DEPLOY_REGION: us-central1
  _AR_REPO: passanota-images
  _SERVICE_NAME: passanota-web
  _RUNTIME_SA: passanota-sa
  _IMAGE: ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}
  _CONCURRENCY: "15"
  _LABEL_APP: passanota
  _LABEL_ENV: production
  _LABEL_OWNER: lucas

  # Application
  _SUPABASE_PUBLISHABLE_KEY: sb_publishable_erZ3_s4f1-kMj6fBIJF0Sw_f6cRHtzq
  _SUPABASE_URL: https://kdmiptpxatsobroqzjnq.supabase.co
  _APP_URL: "https://passanota.caldasdev.store"
  _PASSANOTA_API_URL: "https://passanota-api-399951936554.us-central1.run.app"
  _MIN_INSTANCES: "0"

steps:
  - id: lint
    name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        corepack enable && corepack prepare pnpm@8.15.9 --activate
        pnpm install --frozen-lockfile
        pnpm lint
        pnpm typecheck

  - id: build
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --cache-from
      - ${_IMAGE}:latest
      - -t
      - ${_IMAGE}:${COMMIT_SHA}
      - -t
      - ${_IMAGE}:latest
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${_SUPABASE_PUBLISHABLE_KEY}
      - --build-arg
      - NEXT_PUBLIC_APP_URL=${_APP_URL}
      - .
    waitFor: [lint]

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_IMAGE}
    waitFor: [build]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_IMAGE}:${COMMIT_SHA}
      - --region
      - ${_DEPLOY_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --timeout
      - "60"
      - --cpu-boost
      - --concurrency
      - ${_CONCURRENCY}
      - --revision-suffix
      - ${SHORT_SHA}
      - --labels
      - app=${_LABEL_APP},env=${_LABEL_ENV},owner=${_LABEL_OWNER}
      - --execution-environment
      - gen2
      - --service-account
      - ${_RUNTIME_SA}@${PROJECT_ID}.iam.gserviceaccount.com
      - --min-instances
      - ${_MIN_INSTANCES}
      - --max-instances
      - "5"
      - --set-env-vars
      - ^|^NODE_ENV=production|PASSANOTA_API_URL=${_PASSANOTA_API_URL}
    waitFor: [push]

images:
  - ${_IMAGE}:${COMMIT_SHA}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY

serviceAccount: projects/${PROJECT_ID}/serviceAccounts/cloud-build-sa@${PROJECT_ID}.iam.gserviceaccount.com
